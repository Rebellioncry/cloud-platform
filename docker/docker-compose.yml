services:
  mysql:
    image: mysql:8.0
    container_name: cloud-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_files:/var/lib/mysql-files
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloud-redis
    restart: always
    ports:
      - "6379:6379"

  mongo:
    image: mongo:6
    container_name: cloud-mongo
    restart: always
    ports:
      - "27017:27017"

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: cloud-nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
      - "18848:8080"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 512m
      JVM_XMX: 512m
      NACOS_AUTH_TOKEN: VGhpc0lzQVNlY3JldEtleUZvck5hY29zQXV0aGVudGljYXRpb25Ub2tlbkVuY3J5cHRpb24=
      NACOS_AUTH_IDENTITY_KEY: Y29udGFpbmVySWRlbnRpdHlLZXk=
      NACOS_AUTH_IDENTITY_VALUE: Y29udGFpbmVySWRlbnRpdHlWYWx1ZQ==
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  mysql_files:
