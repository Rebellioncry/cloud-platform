spring:
  application:
    name: ${APP_NAME:gateway}
  config:
    import: optional:nacos:gateway.yaml?server-addr=${NACOS_CONFIG_ADDR:172.26.76.190:8848}&group=DEFAULT_GROUP

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:172.26.76.190:8848}
        namespace: ${NACOS_NAMESPACE:}

server:
  port: ${SERVER_PORT:8080}
