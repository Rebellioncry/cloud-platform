spring:
  application:
    name: ${APP_NAME:resource-service}
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:172.26.76.190}:${MONGO_PORT:27017}/cloud_platform_logs

server:
  port: 8083

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn
  cors: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
