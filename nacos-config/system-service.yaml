spring:
  application:
    name: ${APP_NAME:system-service}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:172.26.76.190}:${MYSQL_PORT:3306}/cloud_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
  data:
    redis:
      host: ${REDIS_HOST:172.26.76.190}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
    mongodb:
      uri: mongodb://${MONGO_HOST:172.26.76.190}:${MONGO_PORT:27017}/cloud_platform_logs

server:
  port: 8082

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.lyz.system.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: jwt
  jwt-secret-key: ${JWT_SECRET_KEY:cloud-platform-jwt-secret-key-must-be-at-least-64-bits-long-2024}
  is-log: false

knife4j:
  enable: true
  setting:
    language: zh_cn
  cors: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
