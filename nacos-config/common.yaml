spring:
  data:
    redis:
      host: ${REDIS_HOST:172.26.76.190}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms

    mongodb:
      uri: mongodb://${MONGO_HOST:172.26.76.190}:${MONGO_PORT:27017}/cloud_platform_logs

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: jwt
  jwt-secret-key: ${JWT_SECRET_KEY:cloud-platform-jwt-secret-key-must-be-at-least-64-bits-long-2024}
  is-log: false

logging:
  level:
    org.lyz: DEBUG
    org.springframework: INFO
